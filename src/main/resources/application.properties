logging.level.com.origin.security=info
logging.level.com.origin=${ORIGIN_LOGGING_LEVEL:info}
#logging.level.org.springframework.data=trace
logging.level.org.springframework.web.servlet.DispatcherServlet=debug
logging.level.root=info
server.port=8082
server.servlet.context-path=/@project.build.finalName@
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
# This will use the cloud URL if available, otherwise it defaults to your laptop's DB
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=originPAH_Local-18052022;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jpa.show-sql=true
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=dbo
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.output.ansi.enabled=ALWAYS
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=file:src/main/resources/templates/


