name: Scheduled Maven Build

on:
  schedule:
    # 2:00 AM UTC is roughly 10:00 PM EST (previous day)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows you to tap "Run workflow" on your phone for testing

jobs:
  build:
    runs-on: ubuntu-latest
    
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          # Tip: In a real repo, use ${{ secrets.DB_PASSWORD }} instead of hardcoding
          SA_PASSWORD: root
        ports:
          - 1433:1433
        # Improved Health Check: Ensures SQL Server is truly ready before the job starts
        options: >-
          --health-cmd="/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourPassword123 -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # NEW: Caches Maven dependencies so your build takes seconds, not minutes
          cache: 'maven'

      - name: Create Database
        run: |
          docker exec ${{ job.services.sqlserver.id }} /opt/mssql-tools/bin/sqlcmd \
          -S localhost -U sa -P root \
          -Q "CREATE DATABASE [originPAH_Local-18052022]"

      - name: Build and Execute
        env:
          SPRING_DATASOURCE_URL: jdbc:sqlserver://localhost:1433;databaseName=originPAH_Local-18052022;encrypt=true;trustServerCertificate=true
          SPRING_DATASOURCE_USERNAME: sa
          SPRING_DATASOURCE_PASSWORD: YourPassword123
          TWELVE_DATA_KEY: ${9b30cb5823944374a3668af9d868e162}
        run: |
          mvn clean package -DskipTests
          java -jar target/quanttest.jar

      - name: Upload Build Artifacts
        if: always() # Uploads even if the tests fail so you can see why
        uses: actions/upload-artifact@v4
        with:
          name: build-results
          path: target/*.jar
          retention-days: 7
